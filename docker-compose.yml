services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15
    container_name: postgres_peliculas
    restart: always
    environment:
      POSTGRES_USER: santiago
      POSTGRES_PASSWORD: plazas2005
      POSTGRES_DB: base_datos_peliculas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santiago -d base_datos_peliculas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aplicación del Dashboard (Streamlit)
  app:
    build: .
    container_name: dashboard_peliculas_app
    # Forzamos a que este contenedor SOLO ejecute Streamlit
    command: ["streamlit", "run", "dashboard_interactive.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_NAME=base_datos_peliculas
      - DB_USER=santiago
      - DB_PASS=plazas2005

  # Entorno de Desarrollo (Jupyter)
  jupyter:
    build: .
    container_name: jupyter_ml
    # Forzamos a que este contenedor SOLO ejecute Jupyter
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''"]
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data: